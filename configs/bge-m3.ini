; BAAI/bge-m3 (Q8_0 - ~606MB)
; 1024-dim multilingual sentence embedding (XLM-RoBERTa, 568M params).
; CLS pooling, 8192 ctx, no query/passage prefix required.
; Picked over snowflake-arctic-embed-l-v2.0 because LobeHub cannot inject
; the "query: " prefix that arctic-embed needs (LobeHub passes embedding
; inputs raw — verified in lobe-chat source).

version = 1

[bge-m3]
model = /home/jaegle/models/bge-m3/bge-m3-Q8_0.gguf
c = 8192
b = 8192
ub = 8192
t = 4
ngl = 999
no-mmap = true
embeddings = true
pooling = cls
load-on-startup = true
