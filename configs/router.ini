; llama.cpp router preset — serves multiple models from one llama-server.
; Section names ([qwen...]) become the model alias used in OpenAI API requests.
; Keys are llama-server CLI flags without leading dashes.

version = 1

; Global defaults are intentionally minimal: the router cascades [*] onto
; ALL known models (including any cached HF models), so anything specific
; to our workflow (load-on-startup, embeddings, jinja) MUST live per-section.
[*]
ngl = 999
b = 2048
ub = 2048
no-mmap = true

[qwen3.6-35b-a3b]
model = /home/jaegle/models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf
c = 262144
t = 8
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
embeddings = true
pooling = last
jinja = true
load-on-startup = true

; 1024-dim multilingual (German + English) embedder for LobeHub RAG.
; CLS pooling, no query prefix required.
[bge-m3]
model = /home/jaegle/models/bge-m3/bge-m3-Q8_0.gguf
c = 8192
b = 8192
ub = 8192
t = 4
embeddings = true
pooling = cls
load-on-startup = true
